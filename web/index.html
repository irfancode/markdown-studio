<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Markdown Studio — local-first editor with live preview, GFM, diagrams, math, and wiki links.">
  <title>Markdown Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/css/texmath.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" id="hljs-theme">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app mode-split" id="app-root">
    <aside class="sidebar" aria-label="Notes">
      <div class="sidebar-inner">
        <div class="logo-row">
          <div class="logo"><span aria-hidden="true">◆</span> Markdown Studio</div>
          <button type="button" class="icon-btn" id="toggle-sidebar" aria-label="Toggle notes" title="Notes">☰</button>
        </div>
        <div class="search-wrap">
          <label for="doc-search" class="sr-only">Search notes</label>
          <input type="search" id="doc-search" placeholder="Search notes…" autocomplete="off">
        </div>
        <div class="sidebar-actions">
          <button type="button" class="btn btn-primary" id="btn-new" style="flex:1">New note</button>
          <button type="button" class="btn" id="btn-open" title="Open .md from disk">Open</button>
        </div>
        <div class="sidebar-section" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted)">Vault</div>
        <div class="doc-list" id="doc-list"></div>
      </div>
    </aside>

    <header class="toolbar" role="toolbar" aria-label="Editor toolbar">
      <button type="button" class="icon-btn" id="toggle-outline" aria-label="Toggle outline" title="Outline">≡</button>
      <div class="btn-group" role="group" aria-label="View mode">
        <button type="button" class="btn btn-seg btn-view" data-view="source" aria-pressed="false">Source</button>
        <button type="button" class="btn btn-seg btn-view" data-view="split" aria-pressed="true">Split</button>
        <button type="button" class="btn btn-seg btn-view" data-view="preview" aria-pressed="false">Preview</button>
      </div>
      <div class="format-bar" aria-label="Format">
        <button type="button" class="btn" id="fmt-bold" title="Bold (⌘B)"><strong>B</strong></button>
        <button type="button" class="btn" id="fmt-italic" title="Italic"><em>I</em></button>
        <button type="button" class="btn" id="fmt-code" title="Inline code">&lt;/&gt;</button>
        <button type="button" class="btn" id="fmt-link" title="Link">Link</button>
        <button type="button" class="btn" id="fmt-h1" title="Heading">H1</button>
        <button type="button" class="btn" id="fmt-ul" title="List">• List</button>
        <button type="button" class="btn" id="fmt-quote" title="Quote">&gt; Quote</button>
      </div>
      <div class="toolbar-spacer"></div>
      <button type="button" class="btn" id="btn-save" title="Download .md (⌘S)">Save .md</button>
      <button type="button" class="btn btn-primary" id="btn-export-html">Export HTML</button>
      <button type="button" class="icon-btn" id="btn-theme" title="Theme">◐</button>
    </header>

    <div class="editor-wrap">
      <div class="editor-split">
        <div class="editor-pane">
          <label for="editor" class="sr-only">Markdown source</label>
          <textarea id="editor" spellcheck="true" aria-label="Markdown editor"></textarea>
        </div>
        <div class="preview-pane" id="preview-wrap">
          <div id="preview" aria-live="polite"></div>
        </div>
      </div>
    </div>

    <aside class="outline-panel" aria-label="Outline">
      <div class="outline-header">Outline</div>
      <ul class="outline-list" id="outline-list"></ul>
    </aside>

    <div class="status-bar" role="status">
      <span id="stat-ln">Ln 1, Col 1</span>
      <span id="stat-words">0 words</span>
      <span id="stat-read">~0 min read</span>
      <span id="stat-view">Split</span>
      <span class="stat-right" id="stat-hint">⌘S save · [[wiki links]]</span>
    </div>

    <div class="mobile-backdrop" id="backdrop" aria-hidden="true"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script type="module">
    import("./app.js").catch((err) => {
      console.error(err);
      const p = document.getElementById("preview");
      const msg = err && err.message ? err.message : String(err);
      if (p) {
        p.innerHTML =
          '<div class="markdown-body" style="padding:1rem;max-width:42rem;margin:0 auto">' +
          "<p><strong>Could not load the editor.</strong> This usually happens when opening the page as a <code>file://</code> URL: browsers block loading editor scripts from the network.</p>" +
          "<p><strong>Fix:</strong> run a local server from the <code>web</code> folder, then open the site over HTTP:</p>" +
          "<pre style=\"background:var(--bg-muted, #f6f8fa);padding:0.75rem;border-radius:8px;overflow:auto\">cd web\npython3 -m http.server 8080\n# open http://localhost:8080</pre>" +
          '<p style="color:#666;font-size:13px;margin-top:1rem">Technical detail: ' +
          msg.replace(/</g, "&lt;") +
          "</p></div>";
      }
    });
  </script>
</body>
</html>
