<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Studio</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --text-primary: #24292e;
            --text-secondary: #586069;
            --accent: #0366d6;
            --border: #e1e4e8;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0d1117;
                --bg-secondary: #161b22;
                --text-primary: #c9d1d9;
                --text-secondary: #8b949e;
                --accent: #58a6ff;
                --border: #30363d;
            }
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .app {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 1rem;
            overflow-y: auto;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .toolbar {
            height: 48px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1rem;
            gap: 0.5rem;
        }
        
        .editor-container {
            flex: 1;
            display: flex;
        }
        
        .editor {
            flex: 1;
            display: flex;
        }
        
        .editor-pane {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
        }
        
        .editor-textarea {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            resize: none;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 14px;
            line-height: 1.6;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .preview-pane {
            flex: 1;
            padding: 1rem 2rem;
            overflow-y: auto;
            border-left: 1px solid var(--border);
            max-width: 800px;
        }
        
        .preview-content {
            max-width: 100%;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn:hover {
            background: var(--bg-secondary);
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        h1, h2, h3, h4, h5, h6 {
            margin: 1.5rem 0 1rem;
            line-height: 1.25;
        }
        
        h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        h3 { font-size: 1.25em; }
        
        p { margin: 1rem 0; }
        
        code {
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            background: var(--bg-secondary);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 85%;
        }
        
        pre {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
        }
        
        pre code {
            background: none;
            padding: 0;
        }
        
        blockquote {
            border-left: 4px solid var(--border);
            padding-left: 1rem;
            color: var(--text-secondary);
            margin: 1rem 0;
        }
        
        ul, ol {
            padding-left: 2rem;
            margin: 1rem 0;
        }
        
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
        }
        
        th, td {
            border: 1px solid var(--border);
            padding: 0.5rem;
        }
        
        th {
            background: var(--bg-secondary);
        }
        
        img {
            max-width: 100%;
        }
        
        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2rem 0;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .sidebar-section {
            margin-bottom: 1.5rem;
        }
        
        .sidebar-section h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .document-item {
            padding: 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .document-item:hover {
            background: var(--bg-primary);
        }
        
        .document-item.active {
            background: var(--accent);
            color: white;
        }
        
        .status-bar {
            height: 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1rem;
            font-size: 12px;
            color: var(--text-secondary);
            gap: 1rem;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .preview-pane {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <span>📝</span> Markdown Studio
            </div>
            
            <div class="sidebar-section">
                <h3>Documents</h3>
                <div class="document-item active">
                    <span>📄</span> Getting Started
                </div>
                <div class="document-item">
                    <span>📄</span> Notes
                </div>
            </div>
            
            <div class="sidebar-section">
                <h3>Folders</h3>
                <div class="document-item">
                    <span>📁</span> Documents
                </div>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="toolbar">
                <button class="btn" onclick="newDocument()">New</button>
                <button class="btn" onclick="openDocument()">Open</button>
                <button class="btn" onclick="saveDocument()">Save</button>
                <div style="flex: 1;"></div>
                <button class="btn btn-primary" onclick="exportDocument()">Export</button>
            </div>
            
            <div class="editor-container">
                <div class="editor">
                    <div class="editor-pane">
                        <textarea 
                            id="editor" 
                            class="editor-textarea"
                            placeholder="Start typing your markdown here..."
                            oninput="updatePreview()"
                        ># Welcome to Markdown Studio

A fast, beautiful markdown editor for Apple Silicon.

## Features

- **Live Preview** - See your changes instantly
- **Syntax Highlighting** - Beautiful code blocks
- **Export Options** - PDF, HTML, Word

## Code Example

```javascript
function hello() {
    console.log("Hello, Markdown Studio!");
}
```

## Table Example

| Feature | Status |
|---------|--------|
| Editor | ✅ |
| Preview | ✅ |
| Export | 🚧 |

> Start writing your markdown here!</textarea>
                    </div>
                    
                    <div class="preview-pane">
                        <div id="preview" class="preview-content"></div>
                    </div>
                </div>
            </div>
            
            <div class="status-bar">
                <span>Ln 1, Col 1</span>
                <span>Markdown</span>
                <span style="margin-left: auto;">Words: 0</span>
            </div>
        </main>
    </div>
    
    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        
        function updatePreview() {
            const content = editor.value;
            preview.innerHTML = parseMarkdown(content);
            updateStatus();
        }
        
        function parseMarkdown(text) {
            let html = text
                // Escape HTML
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                // Headers
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                // Bold
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                // Code blocks
                .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // Links
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
                // Images
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
                // Blockquote
                .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
                // Lists
                .replace(/^- (.*$)/gm, '<li>$1</li>')
                // Horizontal rule
                .replace(/^---$/gm, '<hr>')
                // Paragraphs
                .replace(/\n\n/g, '</p><p>')
                // Line breaks
                .replace(/\n/g, '<br>');
            
            return `<p>${html}</p>`;
        }
        
        function updateStatus() {
            const content = editor.value;
            const words = content.trim().split(/\s+/).filter(w => w).length;
            document.querySelector('.status-bar span:last-child').textContent = `Words: ${words}`;
        }
        
        function newDocument() {
            editor.value = '';
            updatePreview();
        }
        
        function openDocument() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.md,.markdown,.txt';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    editor.value = e.target.result;
                    updatePreview();
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        function saveDocument() {
            const content = editor.value;
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document.md';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function exportDocument() {
            const format = prompt('Export format: html, pdf, txt');
            if (format === 'html') {
                const html = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>body { max-width: 800px; margin: 0 auto; padding: 2rem; font-family: system-ui; }</style>
</head>
<body>
${preview.innerHTML}
</body>
</html>`;
                const blob = new Blob([html], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'document.html';
                a.click();
            }
        }
        
        // Initialize
        updatePreview();
    </script>
</body>
</html>
